  <!-- Resolucao Red Screen of Death: Se um arquivo JS falhar (cache), auto-refresh forcado. Nao exibe tela vermelha. -->
  <script>
    window.addEventListener("error", (e) => {
      const msg = e.message || '';
      if (msg.includes("Unexpected token '<'") || msg.includes("Failed to fetch dynamically imported module") || msg.includes("Importing a module script failed")) {
        // Tentativa 1 vez: Se o cache estiver sujo aponta pro index de 1s atras, ele se mata e roda dnovo invisivelmente
        if (!sessionStorage.getItem('__rx_refresh')) {
          sessionStorage.setItem('__rx_refresh', '1');
          window.location.reload(true);
        }
      }
    });
    // Limpa a flag e comemora que o site abriu normal
    setTimeout(() => sessionStorage.removeItem('__rx_refresh'), 3000);
  </script>
