  <!-- Chunk stale cache guard: reloads ONCE if a dynamic import fails (outdated cached JS chunk) -->
  <script>
    window.addEventListener("error", function(e) {
      var msg = (e.message || '') + (e.filename || '');
      var isChunkError = (
        msg.includes("Failed to fetch dynamically imported module") ||
        msg.includes("Importing a module script failed") ||
        msg.includes("error loading dynamically imported module")
      );
      if (isChunkError && !sessionStorage.getItem('__rx_chunk_refresh')) {
        sessionStorage.setItem('__rx_chunk_refresh', '1');
        window.location.reload();
      }
    });
    // Limpa flag após carregamento bem-sucedido
    window.addEventListener('load', function() {
      sessionStorage.removeItem('__rx_chunk_refresh');
    });
  </script>
