<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #000;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: #03FC3B;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
        }

        h1 {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status {
            padding: 12px;
            background: #f5f5f5;
            margin-bottom: 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #666;
        }

        .status.recording {
            background: #03FC3B;
            color: #000;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: 2px solid #000;
            background: #000;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #333;
        }

        .btn.stop {
            background: #fff;
            color: #000;
        }

        .btn.stop:hover {
            background: #f5f5f5;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            margin-top: 16px;
            padding: 12px;
            background: #f9f9f9;
            font-size: 10px;
            color: #666;
            line-height: 1.5;
        }

        .timer {
            font-size: 24px;
            font-weight: 900;
            font-family: monospace;
            text-align: center;
            margin: 16px 0;
        }

        .settings {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .settings label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #666;
            cursor: pointer;
        }

        .settings input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="images/target_icon.png" alt="Ork Logo" style="width: 32px; height: 32px; object-fit: contain;">
        <h1>Ork</h1>
    </div>

    <div id="status" class="status">
        Aguardando Google Meet...
    </div>

    <div id="timer" class="timer" style="display: none;">
        00:00:00
    </div>

    <button id="recordBtn" class="btn" disabled>
        Iniciar Gravação
    </button>

    <div class="info">
        <strong>Como funciona:</strong><br>
        1. Entre em uma reunião do Google Meet<br>
        2. Clique em "Iniciar Gravação"<br>
        3. Ao terminar, a transcrição será processada automaticamente
    </div>

    <div class="settings">
        <label>
            <input type="checkbox" id="autoRecord">
            Gravar automaticamente ao entrar no Meet
        </label>
    </div>

    <script src="popup.js"></script>
</body>

</html>
