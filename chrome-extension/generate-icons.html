<!DOCTYPE html>
<html>

<head>
    <title>Ork Icon Generator</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        canvas {
            border: 1px solid #ccc;
            margin: 10px;
            background: white;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }
    </style>
</head>

<body>
    <h1>Ork Icon Generator</h1>
    <p>Clique no botão para baixar os ícones. Depois mova-os para a pasta <code>chrome-extension/icons/</code></p>

    <div class="container">
        <div>
            <h3>16x16</h3>
            <canvas id="icon16" width="16" height="16"></canvas>
        </div>
        <div>
            <h3>48x48</h3>
            <canvas id="icon48" width="48" height="48"></canvas>
        </div>
        <div>
            <h3>128x128</h3>
            <canvas id="icon128" width="128" height="128"></canvas>
        </div>
    </div>

    <button onclick="downloadAll()">Download All Icons</button>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            const padding = size * 0.1;

            // Background - Black circle
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2 - padding / 2, 0, Math.PI * 2);
            ctx.fill();

            // Inner circle - RevGreen
            ctx.fillStyle = '#03FC3B';
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2 - padding * 2, 0, Math.PI * 2);
            ctx.fill();

            // Letter O - Black
            ctx.fillStyle = '#000000';
            ctx.font = `bold ${size * 0.5}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('O', size / 2, size / 2 + size * 0.02);
        }

        // Draw all icons
        drawIcon(document.getElementById('icon16'), 16);
        drawIcon(document.getElementById('icon48'), 48);
        drawIcon(document.getElementById('icon128'), 128);

        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function downloadAll() {
            downloadCanvas(document.getElementById('icon16'), 'icon16.png');
            setTimeout(() => downloadCanvas(document.getElementById('icon48'), 'icon48.png'), 100);
            setTimeout(() => downloadCanvas(document.getElementById('icon128'), 'icon128.png'), 200);
        }
    </script>
</body>

</html>
