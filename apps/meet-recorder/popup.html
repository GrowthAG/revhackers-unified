<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RevHackers Meet Recorder</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 16px;
      margin: 0;
      background-color: #09090b;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .header {
      font-weight: 800;
      letter-spacing: -0.5px;
      font-size: 16px;
      color: #fff;
    }
    .status {
      font-size: 12px;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 4px;
      border: none;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-start {
      background-color: #03FC3B;
      color: #000;
    }
    .btn-start:hover { background-color: #02c72f; }
    
    .btn-stop {
      background-color: #ef4444;
      color: #fff;
      display: none;
    }
    .btn-stop:hover { background-color: #dc2626; }
    
    .pulsing-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ef4444;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body>
  <div class="header">RevHackers Recorder</div>
  <div class="status" id="statusText">Pronto para Mapear</div>
  
  <button id="startBtn" class="btn btn-start">▶ INICIAR CAPTURA</button>
  <button id="stopBtn" class="btn btn-stop"><span class="pulsing-dot"></span>FINALIZAR CALL</button>

  <script src="popup.js"></script>
</body>
</html>
