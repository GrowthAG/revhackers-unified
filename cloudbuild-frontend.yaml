  _VITE_FIREBASE_PROJECT_ID: 'revhackers-staging'
  _VITE_GOOGLE_AUTH_ENABLED: 'true'
  _VITE_GCP_API_URL: 'https://revhackers-api-staging-254666331430.southamerica-east1.run.app'
  _VITE_GROWTHMAP_GCP_ENABLED: 'true'
