steps:
  # Step 1: build do frontend com Node (gera o dist/)
  - name: 'node:20-slim'
    id: vite-build
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        echo "==> Instalando dependencias..."
        npm ci --prefer-offline 2>/dev/null || npm install
        echo "==> Buildando frontend (Vite)..."
        npm run build:vite 2>/dev/null || npx vite build
        echo "==> Build concluido. Arquivos em dist/:"
        ls dist/ | head -10
    env:
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'
      - 'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - 'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - 'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - 'VITE_GOOGLE_AUTH_ENABLED=${_VITE_GOOGLE_AUTH_ENABLED}'
      - 'VITE_GCP_API_URL=${_VITE_GCP_API_URL}'
      - 'VITE_GROWTHMAP_GCP_ENABLED=${_VITE_GROWTHMAP_GCP_ENABLED}'

  # Step 2: build da imagem Docker usando o dist/ gerado
  - name: 'gcr.io/cloud-builders/docker'
    id: docker-build
    args:
      - build
      - --file=Dockerfile.frontend
      - --tag=${_IMAGE}
      - .

images:
  - ${_IMAGE}

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
