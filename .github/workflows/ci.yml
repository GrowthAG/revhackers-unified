name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  quality:
    name: Typecheck + Tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend TypeScript check
        run: npx tsc --noEmit

      - name: GCP API strict TypeScript check
        run: npm run typecheck:api

      - name: Unit and migration foundation tests
        run: npm test

      - name: Build
        run: npm run build
