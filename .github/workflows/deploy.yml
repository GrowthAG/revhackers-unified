name: Validate production artifact

on:
  workflow_dispatch:

concurrency:
  group: production-artifact-validation
  cancel-in-progress: false

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Validate deploy artifact
        run: node scripts/validate-deploy-artifact.mjs ./dist

      - name: Preserve validated artifact
        uses: actions/upload-artifact@v4
        with:
          name: revhackers-validated-dist
          path: ./dist/
          if-no-files-found: error
          retention-days: 7
