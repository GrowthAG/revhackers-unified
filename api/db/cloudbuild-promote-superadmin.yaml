steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: promote-first-superadmin
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        apt-get update -qq && apt-get install -y postgresql-client curl 2>/dev/null

        curl -fsSL \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64 \
          -o /usr/local/bin/cloud-sql-proxy
        chmod +x /usr/local/bin/cloud-sql-proxy

        /usr/local/bin/cloud-sql-proxy \
          revhackers-staging:southamerica-east1:revhackers-staging-pg \
          --port=5432 --auto-iam-authn >/tmp/proxy.log 2>&1 &
        sleep 8

        PG_PASS=$(gcloud secrets versions access latest \
          --secret=cloudsql-postgres-password --project=revhackers-staging)

        run_sql() {
          PGPASSWORD="$${PG_PASS}" psql \
            "host=127.0.0.1 port=5432 dbname=revhackers sslmode=disable user=postgres" \
            "$@"
        }

        echo "==> Usuarios no banco:"
        run_sql -c "
          SELECT u.id, u.global_role, u.status, i.issuer, i.subject
          FROM app.internal_users u
          LEFT JOIN app.user_identities i ON i.user_id = u.id
          ORDER BY u.created_at;
        "

        echo ""
        echo "==> Promovendo usuario com subject '${_FIREBASE_SUBJECT}' a super_admin..."
        run_sql -c "
          UPDATE app.internal_users u
          SET global_role = 'super_admin'
          FROM app.user_identities i
          WHERE i.user_id = u.id
            AND i.subject = '${_FIREBASE_SUBJECT}';
        "

        echo "==> Estado apos promocao:"
        run_sql -c "
          SELECT u.id, u.global_role, u.status, i.subject
          FROM app.internal_users u
          LEFT JOIN app.user_identities i ON i.user_id = u.id
          ORDER BY u.created_at;
        "

        echo "==> Promocao concluida."

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _FIREBASE_SUBJECT: 'SUBSTITUA_PELO_UID_DO_FIREBASE'
