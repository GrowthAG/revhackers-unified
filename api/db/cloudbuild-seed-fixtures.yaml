steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: show-and-seed
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        apt-get update -qq && apt-get install -y postgresql-client curl 2>/dev/null

        curl -fsSL \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64 \
          -o /usr/local/bin/cloud-sql-proxy
        chmod +x /usr/local/bin/cloud-sql-proxy

        /usr/local/bin/cloud-sql-proxy \
          revhackers-staging:southamerica-east1:revhackers-staging-pg \
          --port=5432 --auto-iam-authn >/tmp/proxy.log 2>&1 &
        sleep 8

        PG_PASS=$(gcloud secrets versions access latest \
          --secret=cloudsql-postgres-password --project=revhackers-staging)

        run_sql() {
          PGPASSWORD="$${PG_PASS}" psql \
            "host=127.0.0.1 port=5432 dbname=revhackers sslmode=disable user=postgres" \
            "$@"
        }

        echo "==> Estado completo do banco:"
        run_sql -c "
          SELECT 'internal_users' AS tbl, COUNT(*)::text AS n FROM app.internal_users
          UNION ALL SELECT 'user_identities', COUNT(*)::text FROM app.user_identities
          UNION ALL SELECT 'tenant_memberships', COUNT(*)::text FROM app.tenant_memberships
          UNION ALL SELECT 'project_tenant_registry', COUNT(*)::text FROM app.project_tenant_registry
          UNION ALL SELECT 'growthmap_results', COUNT(*)::text FROM app.growthmap_results;
        "

        echo "==> Dados existentes:"
        run_sql -c "
          SELECT u.id, u.global_role, u.status,
                 i.issuer, i.subject,
                 m.tenant_id, m.role
          FROM app.internal_users u
          LEFT JOIN app.user_identities i ON i.user_id = u.id
          LEFT JOIN app.tenant_memberships m ON m.user_id = u.id;
        "

        run_sql -c "SELECT tenant_id, project_id FROM app.project_tenant_registry;"

        echo "==> Inserindo projeto de teste no registry..."
        run_sql -c "
          BEGIN;
          SET LOCAL app.tenant_id = '11111111-1111-4111-8111-111111111111';
          INSERT INTO app.project_tenant_registry (tenant_id, project_id)
          VALUES (
            '11111111-1111-4111-8111-111111111111',
            '00000000-0000-0000-0000-000000000100'
          )
          ON CONFLICT DO NOTHING;
          COMMIT;
          -- Verifica fora de transacao (sem RLS bloqueando SELECT do postgres)
          SELECT tenant_id, project_id FROM app.project_tenant_registry;
        "

        echo "==> IDs de staging para E2E:"
        echo "    TENANT_ID  = 11111111-1111-4111-8111-111111111111"
        echo "    PROJECT_ID = 00000000-0000-0000-0000-000000000100"
        echo "    ISSUER     = https://securetoken.google.com/revhackers-staging"
        echo "    SUBJECT    = synthetic-growthmap-e2e"
        echo ""
        echo "==> Para testar via curl (apos login Google real):"
        echo "    curl -H 'Authorization: Bearer <ID_TOKEN>' \\"
        echo "    https://revhackers-api-staging-3na73syj5a-rj.a.run.app/v1/growthmaps/00000000-0000-0000-0000-000000000100"

options:
  logging: CLOUD_LOGGING_ONLY
