<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Header */
    .header {
      background: #09090b;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo {
      width: 24px; height: 24px;
      background: #00CC6A;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 11px; color: #000;
    }
    .brand { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #fff; }

    /* Auth indicator */
    .auth-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #3f3f46;
    }
    .auth-dot.ok { background: #00CC6A; }

    /* Mode panel */
    .panel { padding: 14px 16px; }

    /* Context label */
    .context-label {
      font-size: 9px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.2em; color: #a1a1aa; margin-bottom: 10px;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #52525b;
      padding: 6px 10px; background: #f4f4f5; border-radius: 6px;
      margin-bottom: 12px; width: 100%;
    }
    .status-badge.recording {
      background: #00CC6A; color: #000;
    }
    .status-badge.linkedin { background: #e8f4fd; color: #0a66c2; }

    .rec-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #a1a1aa; flex-shrink: 0;
    }
    .recording .rec-dot { background: #000; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Timer */
    .timer {
      font-size: 28px; font-weight: 900; font-family: monospace;
      text-align: center; color: #09090b; letter-spacing: 0.05em;
      margin: 10px 0;
    }

    /* Primary button */
    .btn-primary {
      width: 100%; padding: 12px;
      background: #09090b; color: #fff;
      border: none; border-radius: 8px;
      font-size: 10px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.15em;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #27272a; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary.stop { background: #fff; color: #09090b; border: 1.5px solid #e4e4e7; }
    .btn-primary.stop:hover { background: #f4f4f5; }
    .btn-primary.sync { background: #00CC6A; color: #000; }
    .btn-primary.sync:hover { background: #00b35c; }

    /* Divider */
    hr { border: none; border-top: 1px solid #f4f4f5; margin: 12px 0; }

    /* Settings row */
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; font-weight: 600; color: #71717a;
    }
    .settings-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    input[type="checkbox"] { width: 14px; height: 14px; accent-color: #09090b; }

    /* Info */
    .info {
      font-size: 10px; color: #a1a1aa; line-height: 1.6;
      padding: 10px 16px 14px;
      border-top: 1px solid #f4f4f5;
    }
    .info strong { color: #71717a; }

    /* Not auth */
    .not-auth {
      text-align: center; padding: 20px 16px;
    }
    .not-auth p { font-size: 11px; color: #71717a; font-weight: 600; margin-bottom: 10px; }
    .not-auth a {
      font-size: 10px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.1em; color: #00CC6A; text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Header sempre visivel -->
  <div class="header">
    <div class="header-left">
      <img src="icons/icon16.png" style="width:20px;height:20px;object-fit:contain;" alt="RH">
      <span class="brand">RevHackers</span>
    </div>
    <div class="auth-dot" id="authDot"></div>
  </div>

  <!-- Conteudo dinamico injetado pelo popup.js -->
  <div id="content"></div>

  <script src="popup.js"></script>
</body>
</html>
